name: Quarto Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y chromium-browser latexmk texlive-full poppler-utils
          npm install -g decktape

      - name: Render site
        run: |
          quarto render --to revealjs --output-dir _site --output index.html

      - name: Export reveal.js slides to PDF with DeckTape
        run: |
          decktape --chrome-arg=--no-sandbox reveal ./_site/index.html ./_site/main.pdf

          pdftoppm -png -r 300 -f 1 -singlefile ./_site/main.pdf ./_site/main-preview

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
