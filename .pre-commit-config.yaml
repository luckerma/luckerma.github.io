default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]

      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]

      - id: check-yaml
      - id: check-json
      - id: check-toml

      - id: check-symlinks
      - id: check-merge-conflict

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [markdown, yaml]

  - repo: local
    hooks:
      - id: taplo-format
        name: taplo-format
        entry: taplo format
        language: system
        files: ^pyproject\.toml$

      - id: taplo-lint
        name: taplo-lint
        entry: taplo lint --default-schema-catalogs
        language: system
        files: ^pyproject\.toml$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]
